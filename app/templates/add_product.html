{% extends "base.html" %}

{% block title %}Add Product | BurgerHub{% endblock %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_product.css') }}">
{% endblock %}

{% block content %}

<section class="page-header">
    <p class="eyebrow">Admin</p>
    <h1>Add New Product</h1>
    <p>Create a new menu item and publish it to the frontend menu.</p>
</section>

<section class="product-form-wrapper">
    <form class="product-form-card" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Classic Beef Burger"
                    required
                >
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select category</option>
                    <option value="Burgers">Burgers</option>
                    <option value="Sides">Sides</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Deals">Deals</option>
                    <option value="Desserts">Desserts</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price *</label>
                <input
                    type="number"
                    id="price"
                    name="price"
                    placeholder="799"
                    min="1"
                    required
                >
            </div>

            <div class="form-group">
                <label for="image">Image Filename</label>
                <input
                    type="text"
                    id="image"
                    name="image"
                    placeholder="burger.jpg"
                >
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea
                id="description"
                name="description"
                rows="5"
                placeholder="Write a short product description..."
                required
            ></textarea>
        </div>

        <div class="form-options">
            <label class="checkbox-field">
                <input type="checkbox" name="is_featured">
                <span>Mark as featured</span>
            </label>

            <label class="checkbox-field">
                <input type="checkbox" name="is_available" checked>
                <span>Available on menu</span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Product</button>
            <a href="{{ url_for('main.menu') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>

{% endblock %}
